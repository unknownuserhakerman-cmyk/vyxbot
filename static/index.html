<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYXBOT v4.0</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            margin: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h1 {
            text-align: center;
            color: #58a6ff;
            font-size: 28px;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        h1 span { color: #f0883e; }
        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        select, input, textarea, button {
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input:focus, textarea:focus { border-color: #58a6ff; }
        button {
            background: #21262d;
            border: 1px solid #30363d;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        button:hover { background: #30363d; border-color: #8b949e; }
        button.primary {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
        }
        button.primary:hover { background: #2ea043; }
        button.danger {
            background: #da3633;
            border-color: #f85149;
            color: #fff;
        }
        button.danger:hover { background: #f85149; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .flex-row select { flex: 1; }
        .flex-row button { width: auto; padding: 10px 20px; white-space: nowrap; }
        .tg-fields, .dc-fields { display: none; }
        .tg-fields.active, .dc-fields.active { display: block; }
        .tg-fields input, .dc-fields input { margin-bottom: 8px; }
        .tg-fields input:last-child, .dc-fields input:last-child { margin-bottom: 0; }
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 14px;
        }
        .toggle-label { font-size: 14px; }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #30363d;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .toggle-switch.active { background: #238636; }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(20px); }
        .action-row {
            display: flex;
            gap: 10px;
        }
        .action-row button { flex: 1; }
        .log-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .log-box .log-entry { color: #8b949e; }
        .log-box .log-entry .time { color: #58a6ff; }
        .log-box .log-entry.error { color: #f85149; }
        .hidden { display: none; }
        .channel-select { margin-bottom: 8px; }
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .status-indicator.online { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
        .status-indicator.offline { background: #f85149; }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            33%  { content: '.'; }
            66%  { content: '..'; }
            100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VYX <span>BOT</span> v4.0</h1>

        <!-- Platform -->
        <div class="section">
            <div class="section-title">Platform</div>
            <select id="platform">
                <option value="">-- Select Platform --</option>
                <option value="telegram">Telegram</option>
                <option value="discord">Discord</option>
            </select>
        </div>

        <!-- Channels -->
        <div class="section">
            <div class="section-title">Channels</div>
            <div class="flex-row">
                <select id="channelSelect" class="channel-select" disabled>
                    <option value="">-- Load channels first --</option>
                </select>
                <button id="loadChannelsBtn" disabled>Load Channels</button>
            </div>
        </div>

        <!-- Auth -->
        <div class="section" id="authSection">
            <div class="section-title">Authentication</div>

            <div class="dc-fields" id="dcFields">
                <input type="password" id="discordToken" placeholder="Discord User Token">
            </div>

            <div class="tg-fields" id="tgFields">
                <input type="number" id="apiId" placeholder="API ID">
                <input type="text" id="apiHash" placeholder="API Hash">
                <input type="password" id="sessionString" placeholder="Session String">
            </div>

            <button id="connectBtn" class="primary" disabled>
                <span class="status-indicator offline" id="statusDot"></span>
                <span id="statusText">Connect</span>
            </button>
        </div>

        <!-- Spam config -->
        <div class="section">
            <div class="section-title">Spam Configuration</div>
            <div class="toggle-row">
                <span class="toggle-label">Spam Target</span>
                <span style="display:flex;align-items:center;gap:10px;">
                    <span id="spamState" style="font-size:13px;color:#8b949e;">OFF</span>
                    <div class="toggle-switch" id="spamToggle"></div>
                </span>
            </div>
        </div>

        <div class="section hidden" id="spamConfig">
            <textarea id="messageInput" rows="3" placeholder="Channel Message (optional)"></textarea>
            <div class="flex-row" style="margin-top:8px;">
                <input type="file" id="imageInput" accept="image/*" style="flex:1;">
                <input type="number" id="intervalInput" placeholder="Interval (s)" value="5" min="1" style="width:100px;">
            </div>
            <div class="action-row" style="margin-top:10px;">
                <button id="startBtn" class="primary" disabled>▶ Start</button>
                <button id="stopBtn" class="danger" disabled>■ Stop</button>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="section">
            <div class="section-title">Activity Log</div>
            <div class="log-box" id="logBox">
                <div class="log-entry">── Ready ──</div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
